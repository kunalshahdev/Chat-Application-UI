<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Application</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1 class="logo">Messages</h1>
        <button class="icon-btn" id="newChatBtn" title="New conversation">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </header>

      <div class="search-box">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" placeholder="Search conversations" id="searchInput">
      </div>

      <nav class="conversations" id="conversationList"></nav>
    </aside>

    <main class="chat-area">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" width="64" height="64">
            <path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
          </svg>
          <div class="empty-dot empty-dot-1"></div>
          <div class="empty-dot empty-dot-2"></div>
          <div class="empty-dot empty-dot-3"></div>
        </div>
        <h2>Your messages</h2>
        <p>Select a conversation to start chatting</p>
      </div>

      <div class="chat-view hidden" id="chatView">
        <header class="chat-header">
          <div class="chat-header-info">
            <div class="avatar" id="chatAvatar"></div>
            <div>
              <h2 id="chatName"></h2>
              <span class="status-text" id="chatStatus"></span>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="icon-btn" title="Search">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
              </svg>
            </button>
            <button class="icon-btn" title="More options">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
              </svg>
            </button>
          </div>
        </header>

        <div class="messages" id="messageList"></div>

        <div class="typing-indicator hidden" id="typingIndicator">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>

        <div class="input-area">
          <input type="text" placeholder="Type a message" id="messageInput" autocomplete="off">
          <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
